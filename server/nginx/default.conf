server {
    listen 80;
    server_name _;
    client_max_body_size 50M;

    # Gzip compression
    gzip on;
    gzip_types application/json application/javascript text/css text/plain;
    gzip_min_length 1000;

    # Proxy timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 180s;
    proxy_read_timeout 180s;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; connect-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob: https://i.ytimg.com https://*.sndcdn.com https://*.hearthis.at; media-src 'self' https://*.dzcdn.net;" always;

    # Frontend Vue.js (static build served by frontend container)
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
    }

    # Cache static assets (JS/CSS with content hash)
    location ~* \.(js|css|png|jpg|svg|woff2)$ {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # FastAPI backend
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # MinIO console — blocked (access via SSH tunnel only)
    location ^~ /minio/ {
        return 403;
    }

    # MinIO fichiers (artworks publics)
    location ^~ /storage/ {
        proxy_pass http://minio:9000/;
        proxy_set_header Host minio:9000;
    }
}
