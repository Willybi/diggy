name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: cd server/frontend && npm ci

      - name: Lint frontend
        run: cd server/frontend && npm run lint

  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      - run: pip install ruff && ruff check server/

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: diggy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-test.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/diggy_test
        run: pytest tests/ -q --cov=server --cov-report= --cov-fail-under=55

  audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      - name: Audit Python dependencies
        run: pip install pip-audit && pip-audit --desc

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: cd server/frontend && npm ci
      - name: Run tests
        run: cd server/frontend && npx vitest run

  deploy:
    runs-on: ubuntu-latest
    needs: [lint-frontend, lint-python, test, test-frontend]
    steps:
      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key -o ConnectTimeout=30 -o ServerAliveInterval=10 -o ServerAliveCountMax=3 "$VPS_USER@$VPS_HOST" '
            cd /root/diggy &&
            git fetch origin &&
            git reset --hard origin/master &&
            docker compose up -d --build --force-recreate &&
            docker compose exec -T nginx nginx -s reload 2>/dev/null || true
          '

      - name: Health check
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key -o ConnectTimeout=30 "$VPS_USER@$VPS_HOST" '
            sleep 15
            curl -sfLk https://localhost/api/health || exit 1
          '

      - name: Smoke test endpoints
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key -o ConnectTimeout=30 "$VPS_USER@$VPS_HOST" '
            FAIL=0
            for endpoint in /api/catalog/?limit=1 /api/artists/?limit=1 /api/sets/?limit=1 /api/genres; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" -Lk "https://localhost${endpoint}")
              if [ "$STATUS" != "200" ]; then
                echo "FAIL: ${endpoint} returned ${STATUS}"
                FAIL=1
              else
                echo "OK: ${endpoint}"
              fi
            done
            exit $FAIL
          '
