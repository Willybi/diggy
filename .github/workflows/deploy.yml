name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install pyrekordbox mutagen pytest pytest-mock requests pytest-asyncio httpx aiosqlite anyio fastapi sqlalchemy[asyncio] boto3

      - name: Run tests
        run: pytest tests/ -v

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy via SSH
        id: deploy
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          timeout: 20s
          command_timeout: 8m
          script: |
            cd /root/diggy
            git fetch origin
            git reset --hard origin/master
            docker compose up -d --build --force-recreate
            docker compose ps

      - name: Wait before retry
        if: steps.deploy.outcome == 'failure'
        run: sleep 30

      - name: Deploy via SSH (retry 1)
        id: deploy_retry1
        if: steps.deploy.outcome == 'failure'
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          timeout: 30s
          command_timeout: 8m
          script: |
            cd /root/diggy
            git fetch origin
            git reset --hard origin/master
            docker compose up -d --build --force-recreate
            docker compose ps

      - name: Wait before retry 2
        if: steps.deploy.outcome == 'failure' && steps.deploy_retry1.outcome == 'failure'
        run: sleep 60

      - name: Deploy via SSH (retry 2)
        if: steps.deploy.outcome == 'failure' && steps.deploy_retry1.outcome == 'failure'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          timeout: 30s
          command_timeout: 8m
          script: |
            cd /root/diggy
            git fetch origin
            git reset --hard origin/master
            docker compose up -d --build --force-recreate
            docker compose ps
