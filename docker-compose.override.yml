services:
  api:
    volumes:
      - ./server/api:/app
    # Dev DBs are migrated, never create_all'd: same schema path as prod
    command: sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2"

  # Dev-only hot reload: prod runs the code baked into the image
  worker:
    volumes:
      - ./server/api:/app
      - ./server/workers:/app/workers

  worker_enrich:
    volumes:
      - ./server/api:/app
      - ./server/workers:/app/workers

  beat:
    volumes:
      - ./server/api:/app
      - ./server/workers:/app/workers

  nginx:
    ports:
      - "${NGINX_PORT:-8080}:80"
