services:
  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./server/nginx/default.ssl.conf.template:/etc/nginx/templates/ssl.conf.template:ro
      - ./server/nginx/empty.conf:/etc/nginx/conf.d/default.conf
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    environment:
      DOMAIN: ${DOMAIN}
    # Reload config every 6h to pick up renewed certs
    entrypoint:
      - /bin/sh
      - -c
      - |
        /docker-entrypoint.sh nginx -g "daemon off;" &
        while :; do sleep 6h; nginx -s reload 2>/dev/null; done

  certbot:
    image: certbot/certbot
    container_name: diggy_certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"
    networks:
      - diggy_network

volumes:
  certbot_conf:
  certbot_www:
