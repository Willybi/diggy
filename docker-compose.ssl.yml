services:
  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./server/nginx/default.ssl.conf.template:/etc/nginx/templates/ssl.conf.template:ro
      - ./server/nginx/empty.conf:/etc/nginx/conf.d/default.conf
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    environment:
      DOMAIN: ${DOMAIN}
    # Reload nginx when certbot signals a renewal via flag file
    entrypoint:
      - /bin/sh
      - -c
      - |
        /docker-entrypoint.sh nginx -g "daemon off;" &
        while :; do
          sleep 60
          if [ -f /etc/letsencrypt/.reload ]; then
            nginx -s reload 2>/dev/null && rm -f /etc/letsencrypt/.reload
          fi
        done

  certbot:
    image: certbot/certbot:v5.7.0
    container_name: diggy_certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --deploy-hook \"touch /etc/letsencrypt/.reload\"; sleep 12h & wait $${!}; done'"
    networks:
      - diggy_network

volumes:
  certbot_conf:
  certbot_www:
