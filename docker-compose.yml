services:
  postgres:
    image: postgres:16-alpine
    container_name: diggy_postgres
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - diggy_network
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: diggy_redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    networks:
      - diggy_network
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: diggy_api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - diggy_network
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: diggy_worker
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - diggy_network
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    command: celery -A workers.celery_app worker --loglevel=info -Q celery,crawl -c 3
    healthcheck:
      test: ["CMD-SHELL", "celery -A workers.celery_app inspect ping -d celery@$$HOSTNAME"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 60s

  worker_enrich:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: diggy_worker_enrich
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - diggy_network
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    command: celery -A workers.celery_app worker --loglevel=info -Q enrich -c 2
    healthcheck:
      test: ["CMD-SHELL", "celery -A workers.celery_app inspect ping -d celery@$$HOSTNAME"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 60s

  beat:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: diggy_beat
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - diggy_network
    volumes:
      - beat_schedule:/var/spool/celery
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    command: celery -A workers.celery_app beat --loglevel=info -s /var/spool/celery/beat-schedule
    healthcheck:
      # PersistentScheduler rewrites the schedule file every ~3 min; stale mtime = beat is stuck
      test: ["CMD-SHELL", "find /var/spool/celery -name 'beat-schedule*' -mmin -15 | grep -q ."]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./server/frontend
      target: production
    container_name: diggy_frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    networks:
      - diggy_network
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: diggy_minio
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          # Raised 1G->2G (2026-07-22): MinIO working-set crept to ~98% of 1G
          # (Go RSS + object-metadata cache); host has ample free RAM. Takes
          # effect on the next deploy (up -d recreates the container; a plain
          # restart does NOT re-read the limit). A weekly `restart minio` cron
          # (Mon 00:30 Europe/Paris) trims RSS as extra hygiene.
          memory: 2G
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
      # Soft heap ceiling BELOW the 2G cgroup limit above: Go's GC targets this
      # and runs harder as RSS approaches it, so an OOM-kill (hard cgroup limit)
      # becomes cheap GC pressure instead. MinIO RSS creeps up over ~a day (heap
      # not returned to the OS + the data-usage scanner walking ~190k objects);
      # this keeps it bounded. 1800MiB leaves ~250MiB for off-heap/goroutines.
      GOMEMLIMIT: 1800MiB
    volumes:
      - minio_data:/data
    networks:
      - diggy_network
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: diggy_nginx
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    volumes:
      - ./server/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend
      - minio
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - diggy_network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider --no-check-certificate https://127.0.0.1:443/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  backup:
    image: alpine:3.20
    container_name: diggy_backup
    profiles: ["backup"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - diggy_network
    volumes:
      - ./server/scripts/backup.sh:/backup.sh:ro
      - ./server/scripts/backup_freshness_check.sh:/freshness.sh:ro
      - backups:/backups
      # Read-write on purpose: rclone rewrites its OAuth token on every refresh (a :ro
      # mount would break it). Host dir only exists on the VPS (profile "backup" never runs locally).
      - /root/.config/rclone:/root/.config/rclone
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache postgresql16-client curl gnupg rclone > /dev/null 2>&1
        curl -sSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc
        chmod +x /usr/local/bin/mc
        cp /backup.sh /tmp/backup.sh && chmod +x /tmp/backup.sh
        /tmp/backup.sh

volumes:
  postgres_data:
  minio_data:
  backups:
  beat_schedule:

networks:
  diggy_network:
    name: diggy_network
