services:
  postgres:
    image: postgres:16-alpine
    container_name: diggy_postgres
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - diggy_network
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: diggy_redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    networks:
      - diggy_network
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  api:
    build:
      context: ./server/api
    container_name: diggy_api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - diggy_network
    volumes:
      - ./server/api:/app
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2

  worker:
    build:
      context: ./server/api
    container_name: diggy_worker
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - diggy_network
    volumes:
      - ./server/api:/app
      - ./server/workers:/app/workers
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    command: celery -A workers.celery_app worker --loglevel=info -Q celery,crawl -c 3

  worker_enrich:
    build:
      context: ./server/api
    container_name: diggy_worker_enrich
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - diggy_network
    volumes:
      - ./server/api:/app
      - ./server/workers:/app/workers
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    command: celery -A workers.celery_app worker --loglevel=info -Q enrich -c 2

  beat:
    build:
      context: ./server/api
    container_name: diggy_beat
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - diggy_network
    volumes:
      - ./server/api:/app
      - ./server/workers:/app/workers
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    command: celery -A workers.celery_app beat --loglevel=info

  frontend:
    build:
      context: ./server/frontend
      target: development
    container_name: diggy_frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    networks:
      - diggy_network
    volumes:
      - ./server/frontend:/app
      - /app/node_modules
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  minio:
    image: minio/minio:latest
    container_name: diggy_minio
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - diggy_network
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: diggy_nginx
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./server/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend
      - minio
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - diggy_network

volumes:
  postgres_data:
  minio_data:

networks:
  diggy_network:
    name: diggy_network
